# Code-quality gate for ipmitui. Install once with `make hooks` (runs
# `pre-commit install`); thereafter every `git commit` runs these against
# the staged files. CI runs the same set over the whole tree via
# `pre-commit run --all-files` (.github/workflows/ci-cd.yml). Bump pinned
# revs with `pre-commit autoupdate`. Kept in lockstep with safl/bty and
# safl/nosi; ruff reads [tool.ruff] from pyproject.toml.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      # Lint (pyflakes, import order, pyupgrade, bugbear) with autofix,
      # then format.
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1024]
