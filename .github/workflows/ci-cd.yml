name: ci-cd

# Single pipeline, same shape as safl/bty and safl/withcache. Everything
# lands through PRs: lint + test run on every pull request and on pushes to
# ``main``. On a green ``main`` build, ``tag-release`` tags ``v<version>``
# (from ``src/ipmitui/__init__.py``) if it does not exist yet; pushing that
# tag fires ``release``, which attaches the wheel + sdist to a GitHub
# release.
#
# The tag is pushed with ``secrets.RELEASE_PAT`` (a fine-grained PAT with
# ``contents: write``), not the default ``GITHUB_TOKEN``: a GITHUB_TOKEN-
# pushed tag does not trigger a new workflow run, so ``release`` would
# never fire.

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Run the same hooks as a local ``git commit`` (ruff lint + format
      # and the hygiene hooks in .pre-commit-config.yaml) over the tree.
      # Invoked directly rather than via pre-commit/action@v3.0.1, which
      # pulls the Node 20 actions/cache@v4 and trips the deprecation
      # warning.
      - run: pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure

  test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      # Editable install pulls in the runtime deps (rich, textual,
      # tomli_w); pytest drives the hermetic suite (ipmitool is stubbed).
      - run: pip install -e . pytest
      - run: pytest -q tests/

  build:
    name: Build wheel + sdist
    needs: [lint, test]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # On a green ``main`` build, tag ``v<version>`` so the publish job (which
  # runs on the tag) fires. Gated on the full suite via ``needs`` so a red
  # main never gets tagged. The tag is pushed with RELEASE_PAT because a
  # GITHUB_TOKEN push would not trigger this workflow.
  tag-release:
    needs: [lint, test, build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}
      - name: Tag the version if it is new
        run: |
          set -euo pipefail
          version=$(sed -n 's/^__version__ = "\(.*\)"/\1/p' src/ipmitui/__init__.py)
          test -n "$version" || { echo "could not read __version__"; exit 1; }
          tag="v${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "${tag} already exists; nothing to do."
            exit 0
          fi
          git tag "${tag}"
          git push origin "${tag}"
          echo "Tagged ${tag}; ci-cd.yml will publish it."

  # Create the GitHub release at the tag and attach the wheel + sdist.
  release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write  # softprops/action-gh-release creates the release
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*
